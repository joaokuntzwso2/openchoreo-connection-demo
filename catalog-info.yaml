apiVersion: backstage.io/v1alpha1
kind: Domain
metadata:
  name: commerce-demo
  title: Commerce Demo Domain
  description: Domain for the OpenChoreo connection demo ecosystem
spec:
  owner: group:default/platform-team

---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: connection-demo
  title: OpenChoreo Connection Demo
  description: Demonstrates service composition, deployment tracks, autoscaling, and managed authentication
spec:
  owner: group:default/platform-team
  domain: commerce-demo

---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: customer-service-api
  title: Customer Service API
  description: API for retrieving customer information
  tags:
    - customer
    - api
    - nodejs
spec:
  type: openapi
  lifecycle: experimental
  owner: group:default/platform-team
  system: connection-demo
  definition: |
    openapi: 3.0.0
    info:
      title: Customer Service API
      version: 1.0.0
    paths:
      /customers:
        get:
          summary: Get customers

---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: payment-service-api
  title: Payment Service API
  description: API for payment status retrieval
  tags:
    - payment
    - api
    - nodejs
spec:
  type: openapi
  lifecycle: experimental
  owner: group:default/platform-team
  system: connection-demo
  definition: |
    openapi: 3.0.0
    info:
      title: Payment Service API
      version: 1.0.0
    paths:
      /payments:
        get:
          summary: Get payments

---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: order-service-api
  title: Order Service API
  description: API aggregating orders, customers, and payments
  tags:
    - orders
    - aggregation
    - api
spec:
  type: openapi
  lifecycle: experimental
  owner: group:default/platform-team
  system: connection-demo
  definition: |
    openapi: 3.0.0
    info:
      title: Order Service API
      version: 1.0.0
    paths:
      /orders:
        get:
          summary: Get enriched orders

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: customer-service
  title: Customer Service
  description: Provides customer data for internal services
  annotations:
    github.com/project-slug: joaokuntzwso2/openchoreo-connection-demo
  tags:
    - nodejs
    - openchoreo
    - customer
    - internal-api
spec:
  type: service
  lifecycle: production
  owner: group:default/platform-team
  system: connection-demo
  providesApis:
    - customer-service-api

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: payment-service
  title: Payment Service
  description: Provides payment status and payment method information
  annotations:
    github.com/project-slug: joaokuntzwso2/openchoreo-connection-demo
  tags:
    - nodejs
    - payment
    - internal-api
spec:
  type: service
  lifecycle: production
  owner: group:default/platform-team
  system: connection-demo
  providesApis:
    - payment-service-api

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: order-service
  title: Order Service
  description: Aggregates customer-service and payment-service into business-ready order objects
  annotations:
    github.com/project-slug: joaokuntzwso2/openchoreo-connection-demo
  tags:
    - nodejs
    - aggregation
    - gateway
    - external-api
spec:
  type: service
  lifecycle: production
  owner: group:default/platform-team
  system: connection-demo
  providesApis:
    - order-service-api
  dependsOn:
    - component:default/customer-service
    - component:default/payment-service
  consumesApis:
    - customer-service-api
    - payment-service-api

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: order-service-beta
  title: Order Service Beta
  description: Beta deployment track for Order Service protected by JWT gateway authentication
  annotations:
    github.com/project-slug: joaokuntzwso2/openchoreo-connection-demo
  tags:
    - beta
    - deployment-track
    - jwt
    - gateway-auth
    - managed-authentication
spec:
  type: service
  lifecycle: experimental
  owner: group:default/platform-team
  system: connection-demo
  dependsOn:
    - component:default/customer-service
    - component:default/payment-service
  consumesApis:
    - customer-service-api
    - payment-service-api